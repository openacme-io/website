name: Deploy

# Runs on push to the default branch after CI passes.
# Secrets required (set by vercel-deployer):
#   VERCEL_TOKEN       — Vercel personal/team token
#   VERCEL_ORG_ID      — from .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID  — from .vercel/project.json after `vercel link`
# Until those are set, this job will fail at the Vercel step — the CI build job
# above is the gate that proves the site is shippable.

on:
  push:
    branches: [main, master]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run if the CI workflow that triggered us succeeded (or on direct push).
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Deploy to Vercel (production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./
